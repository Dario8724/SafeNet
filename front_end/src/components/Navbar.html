<!-- Navbar Component -->
<header id="main-navbar" class="fixed top-0 left-0 right-0 z-50 glass border-b border-border/50 bg-white/80 backdrop-blur-md">
  <div class="container mx-auto px-4 flex items-center justify-between h-16">
    <a href="HomeScreen.html" class="flex items-center gap-2.5 group">
      <div class="w-9 h-9 rounded-xl bg-primary flex items-center justify-center shadow-md shadow-primary/25 group-active:scale-95 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary-foreground"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
      </div>
      <span class="text-lg font-extrabold tracking-tight">
        Safe<span class="gradient-text">Net</span>
      </span>
    </a>

    <!-- Desktop nav -->
    <nav class="hidden md:flex items-center gap-1">
      <a href="HomeScreen.html" data-path="HomeScreen.html" class="nav-link px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 active:scale-95 text-muted-foreground hover:text-foreground hover:bg-muted">
        Início
      </a>
      <a href="ChatScreen.html" data-path="ChatScreen.html" class="nav-link px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 active:scale-95 text-muted-foreground hover:text-foreground hover:bg-muted">
        Chat de Apoio
      </a>
      <a href="ResourcesScreen.html" data-path="ResourcesScreen.html" class="nav-link px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 active:scale-95 text-muted-foreground hover:text-foreground hover:bg-muted">
        Recursos
      </a>
      <a href="ReportScreen.html" data-path="ReportScreen.html" class="nav-link px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 active:scale-95 text-muted-foreground hover:text-foreground hover:bg-muted">
        Denúncia
      </a>
    </nav>

    <div class="hidden md:flex items-center gap-3">
      <a href="ChatScreen.html" class="bg-primary text-primary-foreground px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-primary/20 hover:shadow-primary/30 active:scale-95 transition-all duration-200">
        Pedir Ajuda
      </a>
    </div>

    <!-- Mobile toggle -->
    <button id="mobile-toggle" class="md:hidden p-2 rounded-lg hover:bg-muted active:scale-95 transition-transform text-foreground">
      <svg id="menu-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      <svg id="close-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- Mobile menu -->
  <div id="mobile-menu" class="hidden md:hidden border-t border-border/50 bg-white/95 backdrop-blur-md animate-fade-in">
    <div class="container mx-auto px-4 py-4 space-y-1">
      <a href="HomeScreen.html" data-path="HomeScreen.html" class="nav-link block w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-colors text-muted-foreground hover:bg-muted">
        Início
      </a>
      <a href="ChatScreen.html" data-path="ChatScreen.html" class="nav-link block w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-colors text-muted-foreground hover:bg-muted">
        Chat de Apoio
      </a>
      <a href="ResourcesScreen.html" data-path="ResourcesScreen.html" class="nav-link block w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-colors text-muted-foreground hover:bg-muted">
        Recursos
      </a>
      <a href="ReportScreen.html" data-path="ReportScreen.html" class="nav-link block w-full text-left px-4 py-3 rounded-xl text-sm font-semibold transition-colors text-muted-foreground hover:bg-muted">
        Denúncia
      </a>
      <a href="ChatScreen.html" class="block w-full bg-primary text-primary-foreground text-center px-4 py-3 rounded-xl text-sm font-bold mt-2">
        Pedir Ajuda
      </a>
    </div>
  </div>
</header>

<script>
  // Navbar Logic
  (function() {
    const mobileToggle = document.getElementById('mobile-toggle');
    const mobileMenu = document.getElementById('mobile-menu');
    const menuIcon = document.getElementById('menu-icon');
    const closeIcon = document.getElementById('close-icon');
    const navLinks = document.querySelectorAll('.nav-link');

    // Toggle Mobile Menu
    mobileToggle.addEventListener('click', () => {
      const isOpen = !mobileMenu.classList.contains('hidden');
      if (isOpen) {
        mobileMenu.classList.add('hidden');
        menuIcon.classList.remove('hidden');
        closeIcon.classList.add('hidden');
      } else {
        mobileMenu.classList.remove('hidden');
        menuIcon.classList.add('hidden');
        closeIcon.classList.remove('hidden');
      }
    });

    // Active Link Logic
    const currentPath = window.location.pathname.split('/').pop() || 'HomeScreen.html';
    navLinks.forEach(link => {
      const linkPath = link.getAttribute('data-path');
      if (linkPath === currentPath) {
        link.classList.remove('text-muted-foreground', 'hover:text-foreground', 'hover:bg-muted');
        link.classList.add('bg-primary/10', 'text-primary');
      }
    });
  })();
</script>
