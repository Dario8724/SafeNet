<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - SafeNet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/config.js"></script>
</head>

<body class="min-h-screen flex flex-col bg-[#f8f9fa]">
  <div id="main-navbar-container"></div>

  <main class="flex-grow-1 d-flex align-items-center justify-content-center py-20">
    <div class="container max-w-md px-4">
      <div class="bg-white border border-border/40 rounded-[2.5rem] p-8 md:p-12 shadow-sm animate-fade-up">
        <div class="text-center mb-10">
          <div
            class="w-16 h-16 bg-primary rounded-2xl d-flex align-items-center justify-content-center mx-auto mb-6 shadow-lg shadow-primary/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
              stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
            </svg>
          </div>
          <h1 id="authTitle" class="text-3xl font-black tracking-tight text-[#1e293b] mb-2">Bem-vindo de volta</h1>
          <p id="authSubtitle" class="text-muted-foreground text-sm">Escolha o seu perfil para entrar.</p>
        </div>

        <div class="d-flex p-1 bg-[#f8f9fa] rounded-2xl mb-8">
          <button id="typeCitizen" type="button" onclick="setUserType('citizen')"
            class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all border-0 bg-white text-primary shadow-sm">
            Cidadão
          </button>
          <button id="typePSP" type="button" onclick="setUserType('psp')"
            class="flex-1 py-2.5 text-sm font-bold rounded-xl transition-all border-0 bg-transparent text-muted-foreground">
            Agente PSP
          </button>
        </div>

        <div id="loginView">
          <form id="loginForm" class="space-y-6">
            <div id="badgeField" class="hidden animate-scale-in">
              <label class="text-xs font-bold uppercase tracking-widest text-[#1e293b] mb-2 block ml-1">Nº de
                Identificação Policial</label>
              <input id="loginBadgeNumber" type="text" placeholder="Ex: 123456"
                class="w-full bg-[#f8f9fa] border-0 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-2 focus:ring-primary/20 transition-all text-[#1e293b]" />
            </div>
            <div>
              <label class="text-xs font-bold uppercase tracking-widest text-[#1e293b] mb-2 block ml-1">E-mail</label>
              <input id="loginEmail" type="email" required placeholder="exemplo@email.com"
                class="w-full bg-[#f8f9fa] border-0 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-2 focus:ring-primary/20 transition-all text-[#1e293b]" />
            </div>
            <div>
              <label
                class="text-xs font-bold uppercase tracking-widest text-[#1e293b] mb-2 block ml-1">Palavra-passe</label>
              <input id="loginPassword" type="password" required placeholder="••••••••"
                class="w-full bg-[#f8f9fa] border-0 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-2 focus:ring-primary/20 transition-all text-[#1e293b]" />
            </div>

            <div class="d-flex align-items-center justify-content-between px-1">
              <label class="d-flex align-items-center gap-2 cursor-pointer group">
                <input type="checkbox" class="rounded border-border text-primary focus:ring-primary/20" />
                <span
                  class="text-xs font-medium text-muted-foreground group-hover:text-primary transition-colors">Lembrar-me</span>
              </label>
              <a href="#" class="text-xs font-bold text-primary hover:underline">Esqueceste-te?</a>
            </div>

            <div class="d-flex gap-3">
              <button type="submit"
                class="flex-grow-1 bg-primary text-white rounded-2xl px-6 py-4 font-bold text-base shadow-lg shadow-primary/20 active:scale-[0.98] transition-all hover:shadow-primary/30 border-0">
                Entrar na conta
              </button>
              <button id="anonymousLogin" type="button"
                class="px-6 py-4 rounded-2xl font-bold text-base border border-border bg-white text-[#1e293b] hover:border-primary/30 hover:text-primary active:scale-[0.98] transition-all">
                Anónimo
              </button>
            </div>
          </form>

          <div class="mt-10 text-center">
            <p class="text-sm text-muted-foreground mb-4">Ainda não tens conta?</p>
            <a id="openRegister" href="RegisterScreen.html"
              class="text-sm font-bold text-[#1e293b] hover:text-primary transition-colors">Criar conta gratuita →</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="main-footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
  <script>
    let currentUserType = 'citizen';

    function setUserType(type) {
      currentUserType = type;
      const citizenBtn = document.getElementById('typeCitizen');
      const pspBtn = document.getElementById('typePSP');
      const badgeField = document.getElementById('badgeField');

      if (type === 'citizen') {
        citizenBtn.className = 'flex-1 py-2.5 text-sm font-bold rounded-xl transition-all border-0 bg-white text-primary shadow-sm';
        pspBtn.className = 'flex-1 py-2.5 text-sm font-bold rounded-xl transition-all border-0 bg-transparent text-muted-foreground';
        badgeField.classList.add('hidden');
      } else {
        pspBtn.className = 'flex-1 py-2.5 text-sm font-bold rounded-xl transition-all border-0 bg-white text-primary shadow-sm';
        citizenBtn.className = 'flex-1 py-2.5 text-sm font-bold rounded-xl transition-all border-0 bg-transparent text-muted-foreground';
        badgeField.classList.remove('hidden');
      }
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      localStorage.setItem('safenet_user_type', currentUserType);
      SafeNet.login();
    });

    document.getElementById('anonymousLogin').addEventListener('click', () => {
      SafeNet.loginAnonymous();
    });

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect');
      const registerLink = document.getElementById('openRegister');
      if (registerLink && redirect) {
        registerLink.href = `RegisterScreen.html?redirect=${encodeURIComponent(redirect)}`;
      }
    });
  </script>
</body>

</html>
