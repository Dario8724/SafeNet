<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmação de Denúncia - SafeNet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/config.js"></script>
</head>

<body class="min-h-screen pt-20 pb-16 flex flex-col bg-[#f8f9fa]">
  <div id="main-navbar-container"></div>

  <main class="flex-grow-1 flex flex-col items-center justify-center">
    <div class="container max-w-lg w-full px-4 mt-8">
      <div class="text-center animate-reveal">
        <div class="w-24 h-24 bg-success/10 rounded-full flex items-center justify-center mx-auto mb-8 shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-success">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </svg>
        </div>
        <h1 class="text-3xl md:text-4xl font-black tracking-tight text-[#1e293b] mb-4">Denúncia enviada</h1>
        <p class="text-muted-foreground text-lg max-w-sm mx-auto mb-12">A tua denúncia foi recebida e será analisada com
          cuidado. Obrigado pela tua coragem. 💙</p>
      </div>

      <div class="space-y-6 animate-reveal" style="transition-delay: 200ms;">
        <div class="bg-white border border-border/40 rounded-[2rem] p-8 shadow-sm">
          <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
              <div class="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  class="text-primary">
                  <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                  <polyline points="14.5 2 14.5 8 20 8" />
                </svg>
              </div>
              <div>
                <h3 class="font-bold text-base text-[#1e293b]">Relatório #2024-0847</h3>
                <p class="text-xs text-muted-foreground mb-0">Gerado automaticamente</p>
              </div>
            </div>
            <button
              class="w-10 h-10 rounded-xl hover:bg-[#f8f9fa] transition-all active:scale-95 cursor-pointer border-0 flex items-center justify-center bg-transparent">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="text-muted-foreground">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" x2="12" y1="15" y2="3" />
              </svg>
            </button>
          </div>
          <div class="bg-[#f8f9fa] rounded-2xl p-5 text-sm text-[#1e293b] space-y-3 font-medium">
            <p class="mb-0 d-flex align-items-center gap-2">
              <span class="opacity-50">📅</span> Data: <span id="reportDate">--/--/----</span>
            </p>
            <p class="mb-0 d-flex align-items-center gap-2">
              <span class="opacity-50">📋</span> Estado: <span class="text-primary">Em análise</span>
            </p>
            <p class="mb-0 d-flex align-items-center gap-2">
              <span class="opacity-50">🔒</span> Privacidade: <span>Confidencial</span>
            </p>
          </div>
        </div>

        <a href="HomeScreen.html"
          class="w-100 btn-modern d-flex align-items-center justify-center gap-3 bg-primary text-white px-6 py-4 shadow-xl shadow-primary/20 text-decoration-none">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 19-7-7 7-7" />
            <path d="M19 12H5" />
          </svg>
          Voltar ao início
        </a>
      </div>
    </div>
  </main>

  <div id="main-footer-container"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const d = document.getElementById('reportDate');
      if (d) d.innerText = new Date().toLocaleDateString("pt-PT");
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
