<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmação de Denúncia - SafeSpace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: 220 20% 97%;
      --foreground: 220 30% 12%;
      --primary: 230 72% 56%;
      --primary-foreground: 0 0% 100%;
      --secondary: 220 14% 96%;
      --secondary-foreground: 220 30% 12%;
      --accent: 260 60% 58%;
      --accent-foreground: 0 0% 100%;
      --muted: 220 14% 96%;
      --muted-foreground: 220 8% 46%;
      --card: 0 0% 100%;
      --border: 220 13% 91%;
      --ring: 230 72% 56%;
      --success: 142 76% 36%;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            primary: {
              DEFAULT: "hsl(var(--primary))",
              foreground: "hsl(var(--primary-foreground))"
            },
            secondary: {
              DEFAULT: "hsl(var(--secondary))",
              foreground: "hsl(var(--secondary-foreground))"
            },
            accent: {
              DEFAULT: "hsl(var(--accent))",
              foreground: "hsl(var(--accent-foreground))"
            },
            muted: {
              DEFAULT: "hsl(var(--muted))",
              foreground: "hsl(var(--muted-foreground))"
            },
            success: {
              DEFAULT: "hsl(var(--success))",
              foreground: "hsl(var(--primary-foreground))"
            },
            card: "hsl(var(--card))",
            border: "hsl(var(--border))",
            ring: "hsl(var(--ring))"
          },
          animation: {
            "fade-up": "fadeUp 0.5s ease-out forwards",
            "scale-in": "scaleIn 0.3s ease-out forwards"
          },
          keyframes: {
            fadeUp: {
              "0%": { opacity: "0", transform: "translateY(20px)" },
              "100%": { opacity: "1", transform: "translateY(0)" }
            },
            scaleIn: {
              "0%": { opacity: "0", transform: "scale(0.95)" },
              "100%": { opacity: "1", transform: "scale(1)" }
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen pt-20 pb-16 flex items-center justify-center">
  
  <div class="container max-w-lg w-full px-4">
    <!-- Success Message -->
    <div class="text-center animate-scale-in">
      <div class="w-24 h-24 bg-success/10 rounded-full flex items-center justify-center mx-auto mb-8">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-success"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h1 class="text-3xl md:text-4xl font-black tracking-tight mb-3">
        Denúncia enviada
      </h1>
      <p class="text-muted-foreground text-base md:text-lg max-w-sm mx-auto mb-10">
        A tua denúncia foi recebida e será analisada com cuidado. Obrigado pela tua coragem. 💙
      </p>
    </div>

    <!-- Report Details -->
    <div class="space-y-4 animate-fade-up" style="animation-delay: 200ms;">
      <!-- Report card -->
      <div class="bg-card border border-border/60 rounded-2xl p-6 shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <div class="p-2.5 bg-primary/10 rounded-xl">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14.5 2 14.5 8 20 8"/></svg>
            </div>
            <div>
              <h3 class="font-bold text-sm">Relatório #2024-0847</h3>
              <p class="text-xs text-muted-foreground">Gerado automaticamente</p>
            </div>
          </div>
          <button class="p-2 rounded-lg hover:bg-muted transition-colors active:scale-95 cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          </button>
        </div>
        <div class="bg-muted rounded-xl p-4 text-sm text-muted-foreground space-y-2">
          <p id="reportDate">📅 Data: --/--/----</p>
          <p>📋 Estado: Em análise</p>
          <p>🔒 Confidencial</p>
        </div>
      </div>

      <!-- Back button -->
      <a 
        href="index.html" 
        class="w-full flex items-center justify-center gap-2 bg-primary text-primary-foreground rounded-2xl px-6 py-4 font-bold text-base shadow-lg shadow-primary/20 active:scale-[0.97] transition-all duration-200 cursor-pointer"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        Voltar ao início
      </a>
    </div>
  </div>

  <script>
    // Set dynamic date
    document.addEventListener('DOMContentLoaded', () => {
      const dateElement = document.getElementById('reportDate');
      const today = new Date().toLocaleDateString("pt-PT");
      dateElement.innerText = `📅 Data: ${today}`;
    });
  </script>
</body>
</html>
