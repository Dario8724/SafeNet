<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recursos de Apoio - SafeNet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/config.js"></script>
</head>

<body class="min-h-screen pt-20 pb-16 bg-[#f8f9fa] flex flex-col">
  <div id="main-navbar-container"></div>

  <main class="flex-grow-1">
    <div class="container mx-auto max-w-6xl px-4 mt-16">
      <div class="animate-fade-up mb-12">
        <p class="text-primary font-bold text-xs tracking-[0.1em] uppercase mb-3">Recursos</p>
        <h1 class="text-4xl md:text-5xl font-black tracking-tight text-[#1e293b] mb-4">Recursos e contactos úteis</h1>
        <p class="text-muted-foreground text-lg max-w-2xl leading-relaxed">Linhas de emergência, contactos da PSP e
          informação prática para te ajudar a agir com segurança.</p>
      </div>
      <div id="resourcesGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <!-- Cards serão inseridos aqui via JavaScript -->
      </div>
    </div>
  </main>

  <div id="main-footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
