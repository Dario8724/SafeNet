<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recursos de Apoio - SafeNet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: 220 20% 97%;
      --foreground: 220 30% 12%;
      --primary: 230 72% 56%;
      --primary-foreground: 0 0% 100%;
      --secondary: 220 14% 96%;
      --secondary-foreground: 220 30% 12%;
      --muted: 220 14% 96%;
      --muted-foreground: 220 8% 46%;
      --card: 0 0% 100%;
      --border: 220 13% 91%;
      --alert: 0 84% 60%;
      --alert-foreground: 0 0% 100%;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
    }
    .card-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px -12px hsla(var(--primary) / 0.15);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            primary: {
              DEFAULT: "hsl(var(--primary))",
              foreground: "hsl(var(--primary-foreground))"
            },
            secondary: {
              DEFAULT: "hsl(var(--secondary))",
              foreground: "hsl(var(--secondary-foreground))"
            },
            muted: {
              DEFAULT: "hsl(var(--muted))",
              foreground: "hsl(var(--muted-foreground))"
            },
            alert: {
              DEFAULT: "hsl(var(--alert))",
              foreground: "hsl(var(--alert-foreground))"
            },
            card: "hsl(var(--card))",
            border: "hsl(var(--border))"
          },
          animation: {
            "fade-up": "fadeUp 0.5s ease-out forwards"
          },
          keyframes: {
            fadeUp: {
              "0%": { opacity: "0", transform: "translateY(20px)" },
              "100%": { opacity: "1", transform: "translateY(0)" }
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen pt-20 pb-16">
  
  <!-- Back Button -->
  <a href="HomeScreen.html" class="absolute top-6 left-6 text-muted-foreground hover:text-foreground transition-colors flex items-center gap-2 text-sm font-medium hover:bg-black/5 p-2 rounded-lg cursor-pointer">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    Voltar
  </a>

  <div class="container mx-auto max-w-5xl px-4">
    <div class="animate-fade-up mb-10">
      <p class="text-primary font-bold text-sm tracking-wide uppercase mb-2">Recursos</p>
      <h1 class="text-3xl md:text-4xl font-black tracking-tight mb-3">
        Informação e apoio ao teu alcance
      </h1>
      <p class="text-muted-foreground text-base md:text-lg max-w-xl">
        Recolhemos os melhores recursos para te ajudar a lidar com situações de cyberbullying.
      </p>
    </div>

    <div id="resourcesGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
      <!-- Resources will be injected here -->
    </div>
  </div>

  <script>
    const resources = [
      { 
        icon: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`, 
        title: "Linha de Ajuda", 
        desc: "Liga para a Linha SOS Criança: 116 111. Disponível 24 horas.", 
        color: "bg-alert text-alert-foreground" 
      },
      { 
        icon: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>`, 
        title: "Segurança Online", 
        desc: "Dicas práticas para protegeres a tua presença digital.", 
        color: "bg-primary/10 text-primary" 
      },
      { 
        icon: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`, 
        title: "O que é Cyberbullying?", 
        desc: "Aprende a identificar sinais e formas de cyberbullying.", 
        color: "bg-secondary text-secondary-foreground" 
      },
      { 
        icon: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>`, 
        title: "Saúde Mental", 
        desc: "Cuida de ti. Recursos sobre bem-estar emocional.", 
        color: "bg-alert text-alert-foreground" 
      },
      { 
        icon: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="19" cy="11" r="3"/></svg>`, 
        title: "Falar com Alguém", 
        desc: "Como pedir ajuda a um adulto de confiança.", 
        color: "bg-primary/10 text-primary" 
      },
      { 
        icon: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>`, 
        title: "Links Úteis", 
        desc: "Organizações portuguesas de apoio e proteção de jovens.", 
        color: "bg-secondary text-secondary-foreground" 
      }
    ];

    const grid = document.getElementById('resourcesGrid');
    grid.innerHTML = resources.map((res, i) => `
      <button class="animate-fade-up flex flex-col items-start gap-4 p-6 rounded-2xl bg-card border border-border/60 text-left card-hover shadow-sm" style="animation-delay: ${i * 100}ms;">
        <div class="p-3 rounded-xl ${res.color}">
          ${res.icon}
        </div>
        <div>
          <h3 class="font-bold text-base mb-1 text-foreground">${res.title}</h3>
          <p class="text-sm text-muted-foreground leading-relaxed">${res.desc}</p>
        </div>
      </button>
    `).join('');
  </script>
</body>
</html>
