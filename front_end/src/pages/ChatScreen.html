<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat de Apoio - SafeNet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/config.js"></script>
</head>

<body class="min-h-screen pt-20 pb-8 flex flex-col bg-[#f8f9fa]">
  <div id="main-navbar-container"></div>

  <main class="flex-grow-1 flex flex-col items-center">
    <div class="container max-w-4xl w-full px-4 mt-12">
      <div class="mb-8 animate-fade-up text-center md:text-left">
        <h1 class="text-3xl md:text-4xl font-black tracking-tight text-[#1e293b]">Chat de Apoio</h1>
        <p class="text-muted-foreground text-base mt-1">Conversa confidencial e segura 🔒</p>
      </div>

      <div
        class="bg-white border border-border/40 rounded-[2rem] shadow-sm overflow-hidden animate-fade-up flex flex-col h-[70vh]"
        style="animation-delay: 100ms;">
        <div id="messagesContainer" class="flex-1 overflow-y-auto px-6 md:px-10 py-8 space-y-6">
          <!-- Mensagens serão inseridas aqui -->
        </div>

        <div class="px-6 md:px-10 py-6 bg-white border-t border-border/40">
          <div class="flex gap-4 items-center">
            <input id="chatInput" type="text" placeholder="Escreve a tua mensagem..."
              class="flex-1 bg-[#f8f9fa] border-0 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-2 focus:ring-primary/20 transition-all" />
            <button id="sendButton" disabled
              class="bg-primary text-white rounded-full p-3.5 active:scale-95 transition-all duration-150 shadow-lg shadow-primary/20 disabled:opacity-40 disabled:pointer-events-none hover:shadow-primary/30 flex items-center justify-center shrink-0 w-12 h-12">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="main-footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/main.js"></script>
</body>

</html>
