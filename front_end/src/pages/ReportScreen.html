<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportar Situação - SafeNet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: 220 20% 97%;
      --foreground: 220 30% 12%;
      --primary: 230 72% 56%;
      --primary-foreground: 0 0% 100%;
      --muted: 220 14% 96%;
      --muted-foreground: 220 8% 46%;
      --card: 0 0% 100%;
      --border: 220 13% 91%;
      --ring: 230 72% 56%;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            primary: {
              DEFAULT: "hsl(var(--primary))",
              foreground: "hsl(var(--primary-foreground))"
            },
            muted: {
              DEFAULT: "hsl(var(--muted))",
              foreground: "hsl(var(--muted-foreground))"
            },
            card: "hsl(var(--card))",
            border: "hsl(var(--border))",
            ring: "hsl(var(--ring))"
          },
          animation: {
            "fade-up": "fadeUp 0.5s ease-out forwards",
            "scale-in": "scaleIn 0.2s ease-out forwards"
          },
          keyframes: {
            fadeUp: {
              "0%": { opacity: "0", transform: "translateY(20px)" },
              "100%": { opacity: "1", transform: "translateY(0)" }
            },
            scaleIn: {
              "0%": { opacity: "0", transform: "scale(0.95)" },
              "100%": { opacity: "1", transform: "scale(1)" }
            }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen pt-20 pb-16">
  
  <!-- Back Button -->
  <a href="HomeScreen.html" class="absolute top-6 left-6 text-muted-foreground hover:text-foreground transition-colors flex items-center gap-2 text-sm font-medium hover:bg-black/5 p-2 rounded-lg cursor-pointer">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    Voltar
  </a>

  <div class="container mx-auto max-w-2xl px-4">
    <div class="animate-fade-up mb-8">
      <p class="text-primary font-bold text-sm tracking-wide uppercase mb-2">Denúncia</p>
      <h1 class="text-3xl md:text-4xl font-black tracking-tight mb-3">
        Reportar uma situação
      </h1>
      <p class="text-muted-foreground text-base md:text-lg">
        Conta-nos o que aconteceu. Tudo é confidencial e seguro.
      </p>
    </div>

    <div class="bg-card border border-border/60 rounded-3xl p-6 md:p-10 shadow-sm animate-fade-up" style="animation-delay: 100ms;">
      <div class="space-y-6">
        <!-- Description -->
        <div>
          <label class="text-sm font-bold mb-2.5 block text-foreground">O que aconteceu?</label>
          <textarea
            id="description"
            placeholder="Descreve a situação com o máximo de detalhe possível..."
            rows="5"
            class="w-full bg-background border border-border rounded-2xl px-5 py-4 text-sm resize-none outline-none focus:ring-2 focus:ring-ring/50 transition-shadow leading-relaxed text-foreground"
          ></textarea>
        </div>

        <!-- Platform -->
        <div>
          <label class="text-sm font-bold mb-2.5 block text-foreground">Onde aconteceu?</label>
          <div class="relative">
            <button
              id="platformDropdownBtn"
              class="w-full bg-background border border-border rounded-2xl px-5 py-3.5 text-sm text-left flex items-center justify-between active:scale-[0.995] transition-transform text-foreground"
            >
              <span id="selectedPlatform" class="text-muted-foreground">Seleciona a plataforma</span>
              <svg id="dropdownIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-muted-foreground transition-transform duration-200"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            <div id="platformDropdown" class="hidden absolute top-full left-0 right-0 mt-2 bg-card border border-border rounded-2xl shadow-xl z-10 overflow-hidden animate-scale-in">
              <!-- Platforms will be injected here -->
            </div>
          </div>
        </div>

        <!-- Upload -->
        <div>
          <label class="text-sm font-bold mb-2.5 block text-foreground">Provas (opcional)</label>
          <label class="flex items-center gap-4 bg-background border-2 border-dashed border-border rounded-2xl px-5 py-5 cursor-pointer hover:border-primary/30 active:scale-[0.995] transition-all group">
            <div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center group-hover:bg-primary/15 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
            </div>
            <div>
              <p class="text-sm font-bold text-foreground">Carregar imagens ou screenshots</p>
              <p class="text-xs text-muted-foreground mt-0.5">PNG, JPG até 10MB</p>
            </div>
            <input
              id="fileInput"
              type="file"
              multiple
              accept="image/*"
              class="hidden"
            />
          </label>
          <p id="fileCount" class="hidden text-xs text-primary font-semibold mt-2"></p>
        </div>

        <!-- Submit -->
        <button
          id="submitBtn"
          disabled
          class="w-full flex items-center justify-center gap-2.5 bg-primary text-primary-foreground rounded-2xl px-6 py-4 font-bold text-base shadow-xl shadow-primary/20 hover:shadow-primary/30 active:scale-[0.97] transition-all duration-200 disabled:opacity-40 disabled:pointer-events-none cursor-pointer"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Submeter denúncia
        </button>
      </div>
    </div>
  </div>

  <script>
    const platforms = ["Instagram", "TikTok", "WhatsApp", "Snapchat", "Facebook", "YouTube", "Discord", "Outro"];
    
    // DOM Elements
    const description = document.getElementById('description');
    const platformBtn = document.getElementById('platformDropdownBtn');
    const platformDropdown = document.getElementById('platformDropdown');
    const selectedPlatform = document.getElementById('selectedPlatform');
    const dropdownIcon = document.getElementById('dropdownIcon');
    const fileInput = document.getElementById('fileInput');
    const fileCount = document.getElementById('fileCount');
    const submitBtn = document.getElementById('submitBtn');

    let currentPlatform = "";

    // Toggle Dropdown
    platformBtn.addEventListener('click', () => {
      platformDropdown.classList.toggle('hidden');
      dropdownIcon.classList.toggle('rotate-180');
    });

    // Inject Platforms
    platformDropdown.innerHTML = platforms.map(p => `
      <button class="w-full text-left px-5 py-3 text-sm hover:bg-muted transition-colors text-foreground" onclick="selectPlatform('${p}')">
        ${p}
      </button>
    `).join('');

    window.selectPlatform = (p) => {
      currentPlatform = p;
      selectedPlatform.innerText = p;
      selectedPlatform.classList.remove('text-muted-foreground');
      selectedPlatform.classList.add('text-foreground');
      platformDropdown.classList.add('hidden');
      dropdownIcon.classList.remove('rotate-180');
    };

    // Close dropdown on click outside
    window.addEventListener('click', (e) => {
      if (!platformBtn.contains(e.target) && !platformDropdown.contains(e.target)) {
        platformDropdown.classList.add('hidden');
        dropdownIcon.classList.remove('rotate-180');
      }
    });

    // File selection
    fileInput.addEventListener('change', (e) => {
      const files = e.target.files;
      if (files.length > 0) {
        fileCount.innerText = `✓ ${files.length} ficheiro(s) selecionado(s)`;
        fileCount.classList.remove('hidden');
      } else {
        fileCount.classList.add('hidden');
      }
    });

    // Validation
    description.addEventListener('input', (e) => {
      submitBtn.disabled = !e.target.value.trim();
    });

    // Submit
    submitBtn.addEventListener('click', () => {
      if (!description.value.trim()) return;
      window.location.href = 'ConfirmationScreen.html';
    });
  </script>
</body>
</html>
