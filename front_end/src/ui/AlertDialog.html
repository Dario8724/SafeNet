<!-- AlertDialog Component -->
<style>
  /* AlertDialog Animations */
  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes fade-out {
    from { opacity: 1; }
    to { opacity: 0; }
  }
  @keyframes zoom-in {
    from { opacity: 0; transform: translate(-50%, -48%) scale(0.95); }
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  @keyframes zoom-out {
    from { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    to { opacity: 0; transform: translate(-50%, -48%) scale(0.95); }
  }

  .alert-dialog-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    background-color: rgba(0, 0, 0, 0.8);
    display: none;
  }

  .alert-dialog-content {
    position: fixed;
    left: 50%;
    top: 50%;
    z-index: 50;
    width: 100%;
    max-width: 32rem;
    transform: translate(-50%, -50%);
    display: none;
    gap: 1rem;
    border: 1px solid hsl(var(--border));
    background-color: hsl(var(--background));
    padding: 1.5rem;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  }

  .alert-dialog-overlay[data-state="open"] {
    display: block;
    animation: fade-in 0.2s ease-out;
  }
  .alert-dialog-overlay[data-state="closed"] {
    animation: fade-out 0.2s ease-out;
  }

  .alert-dialog-content[data-state="open"] {
    display: grid;
    animation: zoom-in 0.2s ease-out;
  }
  .alert-dialog-content[data-state="closed"] {
    animation: zoom-out 0.2s ease-out;
  }

  @media (min-width: 640px) {
    .alert-dialog-content {
      border-radius: 0.5rem;
    }
  }
</style>

<!-- Trigger Example -->
<button 
  type="button" 
  class="bg-primary text-primary-foreground px-4 py-2 rounded-md font-medium hover:bg-primary/90 active:scale-95 transition-all"
  onclick="openAlertDialog('example-alert')"
>
  Abrir Alerta
</button>

<!-- AlertDialog Structure -->
<div id="example-alert-overlay" class="alert-dialog-overlay" data-state="closed" onclick="closeAlertDialog('example-alert')"></div>
<div id="example-alert-content" class="alert-dialog-content" data-state="closed">
  <div class="flex flex-col space-y-2 text-center sm:text-left">
    <h2 class="text-lg font-semibold text-foreground">Tens a certeza absoluta?</h2>
    <p class="text-sm text-muted-foreground">
      Esta ação não pode ser desfeita. Isto irá apagar permanentemente os teus dados dos nossos servidores.
    </p>
  </div>
  <div class="flex flex-col-reverse sm:flex-row sm:justify-end sm:space-x-2 mt-4">
    <button 
      type="button" 
      class="mt-2 sm:mt-0 px-4 py-2 rounded-md border border-input bg-background hover:bg-accent hover:text-accent-foreground font-medium transition-colors"
      onclick="closeAlertDialog('example-alert')"
    >
      Cancelar
    </button>
    <button 
      type="button" 
      class="px-4 py-2 rounded-md bg-primary text-primary-foreground hover:bg-primary/90 font-medium transition-colors"
      onclick="handleAlertDialogAction('example-alert')"
    >
      Continuar
    </button>
  </div>
</div>

<script>
  function openAlertDialog(id) {
    const overlay = document.getElementById(`${id}-overlay`);
    const content = document.getElementById(`${id}-content`);
    
    overlay.setAttribute('data-state', 'open');
    content.setAttribute('data-state', 'open');
    document.body.style.overflow = 'hidden'; // Prevent scroll
  }

  function closeAlertDialog(id) {
    const overlay = document.getElementById(`${id}-id-overlay`) || document.getElementById(`${id}-overlay`);
    const content = document.getElementById(`${id}-id-content`) || document.getElementById(`${id}-content`);
    
    overlay.setAttribute('data-state', 'closed');
    content.setAttribute('data-state', 'closed');
    
    // Wait for animation to finish before hiding
    setTimeout(() => {
      if (overlay.getAttribute('data-state') === 'closed') {
        overlay.style.display = 'none';
        content.style.display = 'none';
        document.body.style.overflow = ''; // Restore scroll
      }
    }, 200);
  }

  function handleAlertDialogAction(id) {
    console.log('Ação confirmada no alerta:', id);
    closeAlertDialog(id);
  }

  // Ensure elements are hidden initially but can be shown with animation
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.alert-dialog-overlay, .alert-dialog-content').forEach(el => {
      el.style.display = 'none';
    });
  });
</script>
