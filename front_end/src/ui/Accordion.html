<!-- Accordion Component -->
<style>
  /* Accordion Animations */
  @keyframes accordion-down {
    from { height: 0; opacity: 0; }
    to { height: var(--radix-accordion-content-height); opacity: 1; }
  }
  @keyframes accordion-up {
    from { height: var(--radix-accordion-content-height); opacity: 1; }
    to { height: 0; opacity: 0; }
  }

  .accordion-content {
    overflow: hidden;
    transition: all 0.2s ease-out;
  }
  
  .accordion-item[data-state="open"] .accordion-content {
    animation: accordion-down 0.2s ease-out;
  }
  
  .accordion-item[data-state="closed"] .accordion-content {
    animation: accordion-up 0.2s ease-out;
    height: 0;
  }

  .accordion-trigger svg {
    transition: transform 0.2s;
  }

  .accordion-item[data-state="open"] .accordion-trigger svg {
    transform: rotate(180deg);
  }
</style>

<div class="accordion w-full space-y-2">
  <!-- Accordion Item Example -->
  <div class="accordion-item border-b border-border" data-state="closed">
    <button 
      type="button"
      class="accordion-trigger flex flex-1 items-center justify-between w-full py-4 font-medium transition-all hover:underline"
      onclick="toggleAccordion(this)"
    >
      <span>Pergunta ou Título do Item</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 shrink-0"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="accordion-content">
      <div class="pb-4 pt-0 text-sm text-muted-foreground">
        Este é o conteúdo do accordion. Podes colocar aqui qualquer texto ou informação adicional.
      </div>
    </div>
  </div>

  <div class="accordion-item border-b border-border" data-state="closed">
    <button 
      type="button"
      class="accordion-trigger flex flex-1 items-center justify-between w-full py-4 font-medium transition-all hover:underline"
      onclick="toggleAccordion(this)"
    >
      <span>Outro Item do Accordion</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 shrink-0"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="accordion-content">
      <div class="pb-4 pt-0 text-sm text-muted-foreground">
        Mais conteúdo detalhado aqui para demonstrar a funcionalidade de colapso.
      </div>
    </div>
  </div>
</div>

<script>
  function toggleAccordion(trigger) {
    const item = trigger.closest('.accordion-item');
    const content = item.querySelector('.accordion-content');
    const isOpen = item.getAttribute('data-state') === 'open';
    
    // Close other items (optional, for "single" accordion behavior)
    const accordion = trigger.closest('.accordion');
    accordion.querySelectorAll('.accordion-item').forEach(otherItem => {
      if (otherItem !== item) {
        otherItem.setAttribute('data-state', 'closed');
        const otherContent = otherItem.querySelector('.accordion-content');
        otherContent.style.height = '0px';
      }
    });

    if (isOpen) {
      item.setAttribute('data-state', 'closed');
      content.style.height = '0px';
    } else {
      item.setAttribute('data-state', 'open');
      // Set height for animation
      const scrollHeight = content.scrollHeight;
      content.style.setProperty('--radix-accordion-content-height', scrollHeight + 'px');
      content.style.height = scrollHeight + 'px';
    }
  }

  // Initialize heights to 0
  document.querySelectorAll('.accordion-content').forEach(content => {
    content.style.height = '0px';
  });
</script>
